name: CD - Render (dev)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: render-dev-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests before deploy
        run: mvn -B test

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set."
            echo "Add it in GitHub: Settings > Secrets and variables > Actions."
            exit 1
          fi

          curl --fail --show-error --silent \
            --retry 3 \
            --retry-delay 2 \
            --request POST "$RENDER_DEPLOY_HOOK_URL"

          echo "Render deploy triggered for dev branch."
