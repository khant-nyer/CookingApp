# PostgreSQL Database Configuration (override via environment variables)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Cognito configuration (must be set to your own AWS Cognito values)
security.cognito.region=${COGNITO_REGION}
security.cognito.user-pool-id=${COGNITO_USER_POOL_ID}
security.cognito.app-client-id=${COGNITO_APP_CLIENT_ID}
security.cognito.app-client-ids=${COGNITO_APP_CLIENT_IDS}
security.cognito.app-client-secret=${COGNITO_APP_CLIENT_SECRET}
security.cognito.jwk-set-uri=${COGNITO_JWK_SET_URI}

# Comma-separated origins for CORS on /api/**
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
