# PostgreSQL Database Configuration (override via environment variables)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Cognito configuration (must be set to your own AWS Cognito values)
security.cognito.region=${COGNITO_REGION:ap-southeast-2}
security.cognito.user-pool-id=${COGNITO_USER_POOL_ID:ap-southeast-2_rt542m5n0}
security.cognito.app-client-id=${COGNITO_APP_CLIENT_ID:3p0ua8hn2o6dk76fqrgofq54g8}
security.cognito.app-client-ids=${COGNITO_APP_CLIENT_IDS:7frnm8fk0j7iv8mqg54fiqd9cp}
security.cognito.app-client-secret=${COGNITO_APP_CLIENT_SECRET:5cac3ndcc2esmfb9kgjkbg80vhhhbcs75hfdmbs4maqppqca620}
security.cognito.jwk-set-uri=${COGNITO_JWK_SET_URI:https://cognito-idp.ap-southeast-2.amazonaws.com/ap-southeast-2_rt542m5n0/.well-known/jwks.json}

# Comma-separated origins for CORS on /api/**
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
