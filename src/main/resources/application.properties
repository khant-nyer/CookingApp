spring.application.name=CookingApp

# Active profile defaults to dev for local development
spring.profiles.active=${APP_PROFILE:dev}

# Comma-separated origins for CORS on /api/**.
# Override in env/profile-specific configs.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Registration idempotency settings
app.idempotency.registration.ttl-minutes=${REGISTRATION_IDEMPOTENCY_TTL_MINUTES:1440}
app.idempotency.registration.cleanup-interval-ms=${REGISTRATION_IDEMPOTENCY_CLEANUP_INTERVAL_MS:300000}
