spring.application.name=CookingApp

# Active profile defaults to dev for local development
spring.profiles.active=${APP_PROFILE:dev}

# Supermarket discovery fallback seeds (used when city_supermarket has no rows for city)
app.supermarket-discovery.fallback-markets[0].city=Bangkok
app.supermarket-discovery.fallback-markets[0].supermarket-name=Big C
app.supermarket-discovery.fallback-markets[0].official-website=https://www.bigc.co.th
app.supermarket-discovery.fallback-markets[0].catalog-search-url=https://www.bigc.co.th/search?q={ingredient}
app.supermarket-discovery.fallback-markets[0].notes=Fallback popular supermarket seed

app.supermarket-discovery.fallback-markets[1].city=Bangkok
app.supermarket-discovery.fallback-markets[1].supermarket-name=Lotus's
app.supermarket-discovery.fallback-markets[1].official-website=https://www.lotuss.com
app.supermarket-discovery.fallback-markets[1].catalog-search-url=https://www.lotuss.com/th/search/{ingredient}
app.supermarket-discovery.fallback-markets[1].notes=Fallback popular supermarket seed

app.supermarket-discovery.fallback-markets[2].city=Bangkok
app.supermarket-discovery.fallback-markets[2].supermarket-name=Tops
app.supermarket-discovery.fallback-markets[2].official-website=https://www.tops.co.th
app.supermarket-discovery.fallback-markets[2].catalog-search-url=https://www.tops.co.th/en/search?query={ingredient}
app.supermarket-discovery.fallback-markets[2].notes=Fallback popular supermarket seed

# Phase 3 city-aware discovery provider settings
app.city-discovery.provider=osm
app.city-discovery.nominatim-base-url=https://nominatim.openstreetmap.org/search
app.city-discovery.max-candidates=8
app.city-discovery.cache-ttl-seconds=1800
app.city-discovery.min-request-interval-ms=1000
app.city-discovery.max-retries=2
app.city-discovery.retry-backoff-ms=700
app.city-discovery.min-confidence-to-persist=0.55


app.supermarket-discovery.fallback-markets[3].city=London
app.supermarket-discovery.fallback-markets[3].supermarket-name=Sainsbury's
app.supermarket-discovery.fallback-markets[3].official-website=https://www.sainsburys.co.uk
app.supermarket-discovery.fallback-markets[3].catalog-search-url=https://www.sainsburys.co.uk/gol-ui/SearchResults/{ingredient}
app.supermarket-discovery.fallback-markets[3].notes=Fallback popular supermarket seed

app.supermarket-discovery.fallback-markets[4].city=London
app.supermarket-discovery.fallback-markets[4].supermarket-name=Tesco
app.supermarket-discovery.fallback-markets[4].official-website=https://www.tesco.com
app.supermarket-discovery.fallback-markets[4].catalog-search-url=https://www.tesco.com/groceries/en-GB/search?query={ingredient}
app.supermarket-discovery.fallback-markets[4].notes=Fallback popular supermarket seed

app.supermarket-discovery.fallback-markets[5].city=London
app.supermarket-discovery.fallback-markets[5].supermarket-name=ASDA
app.supermarket-discovery.fallback-markets[5].official-website=https://groceries.asda.com
app.supermarket-discovery.fallback-markets[5].catalog-search-url=https://groceries.asda.com/search/{ingredient}
app.supermarket-discovery.fallback-markets[5].notes=Fallback popular supermarket seed
