# Production profile should be configured by environment variables.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Cognito configuration
security.cognito.region=${COGNITO_REGION}
security.cognito.user-pool-id=${COGNITO_USER_POOL_ID}
security.cognito.app-client-id=${COGNITO_APP_CLIENT_ID}
security.cognito.app-client-ids=${COGNITO_APP_CLIENT_IDS:}
security.cognito.app-client-secret=${COGNITO_APP_CLIENT_SECRET:}
security.cognito.jwk-set-uri=${COGNITO_JWK_SET_URI:}

# Comma-separated origins for CORS on /api/**
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}
